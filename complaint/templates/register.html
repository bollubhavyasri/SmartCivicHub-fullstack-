{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            /* 🔥 background image */
            background: url("{% static 'images/bg.png' %}") no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* 🔥 DARK OVERLAY */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* adjust darkness here */
            z-index: 0;
        }

        .box {
            position: relative;
            z-index: 1;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00c6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
            color: white;
        }

    </style>
</head>

<body>

<div class="box">
    <h1>Register</h1>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">

        <select name="organization">
            <option value="">Select Organization</option>
            {% for org in orgs %}
                <option value="{{ org.id }}">{{ org.name }}</option>
            {% endfor %}
        </select>

        <select name="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
